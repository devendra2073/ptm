
 <!DOCTYPE html>
<html>
  <head>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=flashlight_on" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style type="text/css" media="all">
      *{
        margin: 0;
        padding: 0;
      }
      #vid{
        height: 100vh;
        width: 100vw;
        position:fixed;
        top: -60px;
        display: none;
        z-index: -2;
      }
      .overlay{
        height:100vh;
        width: 100vw;
        position:fixed;
        top: -20px;
        z-index: 2;
      }
      .crd{
      
        display: flex;
        
      color: #f5f5f5;
      font-size: 22px;
      }
      .title{
        font-weight: 700;
      }
      .nv{
        margin-top: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .crd{
        font-weight: 700;
      }
      .bottom{
        
        height: 20px;
        width: 100vw;
        position: absolute;
        bottom: 180px;
      }
      .icn{
        background:linear-gradient(0deg,rgba(0,0,0,1),rgba(0,0,0,0));
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .ic{
        background: rgba(0,0,0,.6);
        color: #fff;
        padding: 20px;
        font-size: 22px;
        border-radius: 100%;
      }
      .pt{
        width: 100vw;
        padding: 20px;
        background:#000;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pt img{
        height: 40px;
        filter: grayscale(100%);
      }
    </style>
  </head>
  <body>
    <video src="#" preload="none" autoplay="autoplay" id="vid"></video>
    <div class="overlay">
      <div class="nv">
        <div class="crd">
          
        
         <p>&nbsp;</p><i class="fa-solid fa-arrow-left" onclick="history.back()"></i>&nbsp;&nbsp;<p class="title">Scan any QR code </p>
       </div>
       <i class="fa-solid fa-ellipsis-vertical crd"></i>
      </div>
      
      <div class="bottom">
        <div class="icn">
          <span class="material-symbols-outlined ic">
flashlight_on
</span>
<i class="fa-regular fa-image ic"></i>
        </div>
        <div class="pt">
          <img src="./media/27297-removebg-preview.png" alt="" />
        </div>
      </div>
      
    </div>
  <script src="./js/script.js" type="text/javascript" charset="utf-8"></script>
  </body>
</html>
